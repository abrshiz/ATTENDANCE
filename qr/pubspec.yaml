name: qr_app
description: A QR Code Attendance Checker App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  qr_flutter: ^4.1.0

  # Scanner
  mobile_scanner: ^5.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Save to gallery
  gal: ^2.3.0

  # Date formatting
  intl: ^0.19.0

  # Share files
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
